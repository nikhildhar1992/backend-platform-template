
services:
  mysql:
    image: mysql:8
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Nikhil@123
      MYSQL_DATABASE: backend_template
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    # So `api` / `worker` wait until MySQL accepts TCP connections (avoids ECONNREFUSED on boot)
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pNikhil@123"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s

  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # API — connects to mysql + redis via Docker network (hostnames: mysql, redis)
  api:
    build: .
    container_name: api
    restart: unless-stopped
    working_dir: /app
    # Host port: use .env next to this file with HOST_PORT=5001 to match local `PORT=5001` (see README).
    ports:
      - "${HOST_PORT:-5000}:5000"
    # Mount source from host so code changes (middleware, routes) apply without rebuilding the image.
    # Without this, `docker compose up` runs whatever was copied at last `docker compose build` — easy to think Docker "ignores" new middleware.
    # Run `docker compose` from the project root (folder that contains `src/`), or this path will be wrong on Windows.
    volumes:
      - ./src:/app/src
    # Overrides Dockerfile ENV NODE_ENV=production so Winston + Morgan log to console (docker logs -f api)
    environment:
      NODE_ENV: development
    env_file:
      - .env.docker
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["node", "src/server.js"]

  # BullMQ email worker — Redis only for queues (same REDIS_URL)
  worker:
    build: .
    container_name: worker-email
    restart: unless-stopped
    volumes:
      - ./src:/app/src
    env_file:
      - .env.docker
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["node", "src/workers/email.worker.js"]

volumes:
  db_data:
